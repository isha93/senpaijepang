name: SenpaiJepang
options:
  bundleIdPrefix: com.senpaijepang
targets:
  SenpaiJepang:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    infoPlist: Info.plist
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO
        DEVELOPMENT_TEAM: "" # Can be empty for local simulator builds
    dependencies:
      - package: netfox
    sources:
      - path: Sources/SenpaiJepangApp
      - path: Sources/SenpaiMobileCore/Core/Network
      - path: Sources/SenpaiMobileCore/Features/Auth/Data
        includes:
          - AuthEndpoint.swift
          - AuthDTO.swift
      - path: Sources/SenpaiMobileCore/Features/Jobs/Data
        includes:
          - JobEndpoint.swift
          - JobDTO.swift
      - path: Sources/SenpaiMobileCore/Features/Journey/Data
        includes:
          - ApplicationDTO.swift
      - path: Sources/SenpaiMobileCore/Features/Profile/Data
        includes:
          - ProfileEndpoint.swift
          - ProfileDTO.swift
      - path: Sources/SenpaiMobileCore/Features/Feed/Data
        includes:
          - FeedEndpoint.swift
          - FeedDTO.swift

packages:
  netfox:
    url: https://github.com/kasketis/netfox
    from: 1.21.0
